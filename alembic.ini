# alembic.ini
# ─────────────────────────────────────────────────────────────────────────────
# Configuração do Alembic para o projeto Clínica Veterinária API
# Nota: DATABASE_URL_SYNC é lida do .env via env.py (não deste arquivo)
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
# Diretório das migrations
script_location = alembic

# Formato do nome dos arquivos de revision
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone para geração de timestamps
timezone = UTC

# URL do banco — sobrescrita pelo env.py via variável de ambiente
sqlalchemy.url = postgresql+psycopg2://clinica_user:clinica_pass@localhost:5432/clinica_veterinaria

# Encoding padrão
prepend_sys_path = .

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
