[pytest]
asyncio_mode = auto
testpaths = app/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    unit: Testes unitários (sem banco de dados)
    integration: Testes de integração (com banco de dados)
    slow: Testes lentos
